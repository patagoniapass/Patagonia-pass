<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Intranet - Patagonia Pass</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <style>
        /* LOGIN SPECIFIC STYLES */
        .login-section {
            background: linear-gradient(135deg, #f0f7fb 0%, #e6f5fc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            margin-top: 0;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 100%;
            padding: 3rem;
            animation: slideUp 0.6s ease-out;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-login {
            width: 60px;
            height: 60px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-blue) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
        }

        .login-header h1 {
            font-size: 1.8rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            font-weight: 900;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            background: white;
            box-shadow: 0 0 0 3px rgba(23, 184, 204, 0.1);
        }

        .login-button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-blue) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(23, 184, 204, 0.4);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .credentials-info {
            background: #f0f7fb;
            border-left: 4px solid var(--accent-cyan);
            padding: 1.5rem;
            border-radius: 8px;
            margin-top: 2rem;
            font-size: 0.9rem;
        }

        .credentials-info h3 {
            color: var(--text-dark);
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
            font-weight: 700;
        }

        .credentials-info p {
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-family: monospace;
            background: white;
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            display: block;
            width: 100%;
        }

        .back-link {
            text-align: center;
            margin-top: 2rem;
        }

        .back-link a {
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: var(--accent-blue);
        }

        .error-message {
            background: #fcebeb;
            color: #e74c3c;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            border-left: 4px solid #e74c3c;
        }

        .success-message {
            background: #eef9f5;
            color: #1cbd71;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            border-left: 4px solid #1cbd71;
        }
        .imagen-logo {
            width: 140px;
            height: 140px;
        }

        header {
            display: none;
        }

        footer {
            display: none;
        }
        .logo-text {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: -0.5px;
}

.logo-text .pass {
    color: var(--accent-cyan);
}
    </style>
</head>
<body>
    <section class="login-section">
        <div class="login-container">
            <div class="login-header">
                
                <div class="logo-login"><img src="assets/images/logo.png" class="imagen-logo"></div>
                <br><span class="logo-text">PATAGONIA<span class="pass">PASS</span></span>
                <p>Acceso Intranet Prestadores</p>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="tu@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••"
                        required
                    >
                </div>

                <button type="submit" class="login-button">Ingresar al Intranet</button>
            </form>

            <div class="credentials-info">
                <h3>📋 Credenciales de Prueba:</h3>
                <p><strong>Email:</strong> prestador@patagoniapass.cl</p>
                <p><strong>Contraseña:</strong> Demo123456!</p>
            </div>

            <div class="back-link">
                <a href="index.html">← Volver al sitio principal</a>
            </div>
        </div>
    </section>

    <script src="assets/js/main.js"></script>
    <script>
        // Credenciales ficticias
        const validCredentials = {
            email: 'prestador@patagoniapass.cl',
            password: 'Demo123456!'
        };

        // Datos simulados de prestadores
        const operatorData = {
            name: 'Ricardo S.',
            role: 'Guía de Montaña',
            location: 'Puerto Natales',
            email: 'prestador@patagoniapass.cl',
            phone: '+56-9-1234-5678',
            totalBookings: 24,
            revenue: '$42,500',
            rating: 4.8,
            status: 'Activo'
        };

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');

            // Limpiar mensajes previos
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            // Validar credenciales
            if (email === validCredentials.email && password === validCredentials.password) {
                // Guardar sesión en localStorage
                localStorage.setItem('operatorLogin', JSON.stringify({
                    email: email,
                    loginTime: new Date().toISOString(),
                    data: operatorData
                }));

                successDiv.textContent = '✓ Acceso exitoso. Redirigiendo...';
                successDiv.style.display = 'block';

                // Redirigir al dashboard después de 1.5 segundos
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                errorDiv.textContent = '✕ Email o contraseña incorrectos. Intenta con los datos de prueba.';
                errorDiv.style.display = 'block';
            }
        });

        // Redirigir si ya está logueado
        window.addEventListener('load', function() {
            const loginData = localStorage.getItem('operatorLogin');
            if (loginData) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
