<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso Intranet — Patagonia Pass</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet" />
  <style>
    .login-section { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 100px 24px; position: relative; overflow: hidden; }
    .login-card { width: 100%; max-width: 440px; background: rgba(255,255,255,0.07); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.12); border-radius: 24px; padding: 40px; position: relative; z-index: 3; box-shadow: var(--shadow); }
    .login-header { text-align: center; margin-bottom: 32px; }
    .login-header h1 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 8px; color: #fff; }
    .login-header p { color: var(--muted); font-size: 0.9rem; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--teal); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .form-control { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 16px; color: #fff; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
    .form-control:focus { border-color: var(--teal); }
    .btn-login { width: 100%; background: linear-gradient(135deg, var(--teal), #00b4d8); color: var(--dark); border: none; border-radius: 12px; padding: 16px; font-weight: 700; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; margin-top: 10px; }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,229,200,0.3); }
    .credentials-box { margin-top: 24px; padding: 16px; background: rgba(0,229,200,0.08); border: 1px dashed var(--teal); border-radius: 12px; text-align: center; }
    .credentials-box p { font-size: 0.8rem; color: var(--teal); font-weight: 600; margin-bottom: 4px; }
    .credentials-box code { font-family: monospace; color: #fff; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; }
    .login-footer { text-align: center; margin-top: 24px; font-size: 0.85rem; color: var(--muted); }
    .login-footer a { color: var(--teal); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <nav id="navbar" class="scrolled">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" class="nav-icon">
          <polygon points="20,3 37,35 3,35" stroke="#00e5c8" stroke-width="2" fill="none"/>
          <polygon points="20,13 30,31 10,31" stroke="#00e5c8" stroke-width="1.2" fill="none" opacity="0.6"/>
        </svg>
        <span>PATAGONIA<strong>PASS</strong></span>
      </a>
    </div>
  </nav>

  <section class="login-section">
    <div class="hero-slide active" style="background-image: url('assets/images/torres-bg.jpg'); opacity: 0.3; filter: blur(4px);"></div>
    <div class="hero-overlay"></div>
    
    <div class="login-card reveal-up visible">
      <div class="login-header">
        <h1>Intranet</h1>
        <p>Panel de Control para Prestadores</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label>Correo Electrónico</label>
          <input type="email" id="email" class="form-control" placeholder="nombre@ejemplo.com" required>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-login">Ingresar al Panel</button>
      </form>

      <div class="credentials-box">
        <p>Acceso de Prueba:</p>
        <p>Usuario: <code>demo@patagoniapass.cl</code></p>
        <p>Contraseña: <code>patagonia2026</code></p>
      </div>

      <div class="login-footer">
        ¿Aún no eres parte? <a href="registro.html">Regístrate aquí</a>
      </div>
    </div>
  </section>

  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      const btn = e.target.querySelector('button');

      if (email === 'demo@patagoniapass.cl' && pass === 'patagonia2026') {
        btn.innerHTML = 'Validando...';
        btn.disabled = true;
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1200);
      } else {
        alert('Credenciales incorrectas. Usa los datos del recuadro inferior.');
      }
    });
  </script>
</body>
</html>
